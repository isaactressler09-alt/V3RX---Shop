<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V3RX — Track Order</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#080808;--bg2:#111;--bg3:#1a1a1a;--mid:#2a2a2a;--gray:#555;--light:#999;--white:#f0ede8;--accent:#c8ff00; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--white);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
  nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:24px 48px;background:linear-gradient(to bottom,rgba(8,8,8,0.97),transparent);z-index:100;}
  .nav-logo{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.1em;color:var(--white);text-decoration:none;}
  .nav-logo span{color:var(--accent);}
  .track-box{background:var(--bg2);border:1px solid var(--mid);padding:56px 48px;max-width:540px;width:100%;position:relative;overflow:hidden;}
  .track-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);}
  .track-box h1{font-family:'Bebas Neue';font-size:3rem;letter-spacing:0.05em;margin-bottom:8px;}
  .track-box p{font-family:'DM Mono';font-size:0.65rem;color:var(--gray);letter-spacing:0.15em;line-height:1.8;margin-bottom:32px;}
  .form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .form-group label{font-family:'DM Mono';font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray);}
  .form-group input{background:var(--bg3);border:1px solid var(--mid);color:var(--white);padding:14px 16px;font-family:'DM Mono';font-size:0.85rem;outline:none;transition:border-color 0.2s;letter-spacing:0.1em;}
  .form-group input:focus{border-color:var(--accent);}
  .form-group input::placeholder{color:var(--gray);}
  .btn{font-family:'DM Mono';font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;transition:all 0.2s;width:100%;margin-top:8px;}
  .btn-primary{background:var(--accent);color:var(--bg);}
  .btn-primary:hover{background:var(--white);}
  .result-box{margin-top:32px;display:none;}
  .status-timeline{margin-top:24px;}
  .status-step{display:flex;gap:16px;align-items:flex-start;padding-bottom:24px;position:relative;}
  .status-step:not(:last-child)::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:1px;background:var(--mid);}
  .status-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--mid);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6rem;}
  .status-dot.done{border-color:var(--accent);background:rgba(200,255,0,0.1);color:var(--accent);}
  .status-dot.current{border-color:var(--accent);background:var(--accent);color:var(--bg);}
  .status-info{}
  .status-name{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:0.05em;}
  .status-desc{font-family:'DM Mono';font-size:0.6rem;color:var(--gray);letter-spacing:0.1em;margin-top:4px;line-height:1.6;}
  .order-details{background:var(--bg3);border:1px solid var(--mid);padding:20px;margin-bottom:24px;}
  .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--mid);font-family:'DM Mono';font-size:0.65rem;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row span:first-child{color:var(--gray);}
  .not-found{text-align:center;padding:24px;font-family:'DM Mono';font-size:0.7rem;color:var(--gray);letter-spacing:0.1em;}
  .loader{display:inline-block;width:16px;height:16px;border:2px solid var(--mid);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .back-link{display:inline-block;margin-top:24px;font-family:'DM Mono';font-size:0.65rem;letter-spacing:0.15em;color:var(--gray);text-decoration:none;text-transform:uppercase;transition:color 0.2s;}
  .back-link:hover{color:var(--accent);}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">V3<span>RX</span></a>
</nav>

<div class="track-box">
  <h1>Track Order</h1>
  <p>// Enter your Order ID and email to see your order status in real time.</p>
  <div class="form-group">
    <label>Order ID</label>
    <input type="text" id="orderIdInput" placeholder="V3RX-XXXXXXXX"/>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="trackEmail" placeholder="you@email.com"/>
  </div>
  <button class="btn btn-primary" onclick="trackOrder()" id="trackBtn">Track My Order →</button>

  <div class="result-box" id="resultBox"></div>
  <a href="/" class="back-link">← Back to Shop</a>
</div>

<script>
const API = '';

const STATUS_STEPS = [
  { key: 'pending', name: 'Order Received', desc: 'Your order has been placed and payment is being verified.' },
  { key: 'confirmed', name: 'Payment Confirmed', desc: 'Payment verified. Your order is being prepared.' },
  { key: 'processing', name: 'Processing', desc: 'Your item is being sourced and prepared for shipment.' },
  { key: 'shipped', name: 'Shipped', desc: 'Your order is on its way! Tracking info will be sent to your email.' },
  { key: 'delivered', name: 'Delivered', desc: 'Your V3RX piece has arrived. Enjoy!' },
];

async function trackOrder() {
  const orderId = document.getElementById('orderIdInput').value.trim();
  const email = document.getElementById('trackEmail').value.trim();
  if (!orderId || !email) { alert('Please enter both fields.'); return; }

  const btn = document.getElementById('trackBtn');
  btn.innerHTML = '<span class="loader"></span>Searching...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/track-order?orderId=${encodeURIComponent(orderId)}&email=${encodeURIComponent(email)}`);
    const data = await res.json();
    renderResult(data);
  } catch(e) {
    renderResult(null);
  }

  btn.innerHTML = 'Track My Order →';
  btn.disabled = false;
}

function renderResult(data) {
  const box = document.getElementById('resultBox');
  box.style.display = 'block';
  if (!data || !data.found) {
    box.innerHTML = `<div class="not-found">⚠️ Order not found.<br/>Double check your Order ID and email address.</div>`;
    return;
  }
  const o = data.order;
  const currentIdx = STATUS_STEPS.findIndex(s => s.key === o.status);
  box.innerHTML = `
    <div class="order-details">
      <div class="detail-row"><span>Order ID</span><span style="color:var(--accent)">${o.orderId}</span></div>
      <div class="detail-row"><span>Item</span><span>${o.productName}</span></div>
      <div class="detail-row"><span>Size</span><span>${o.size}</span></div>
      <div class="detail-row"><span>Total</span><span>$${o.price}</span></div>
      <div class="detail-row"><span>Placed</span><span>${new Date(o.createdAt).toLocaleDateString()}</span></div>
    </div>
    <div class="status-timeline">
      ${STATUS_STEPS.map((s, i) => `
        <div class="status-step">
          <div class="status-dot ${i < currentIdx ? 'done' : i === currentIdx ? 'current' : ''}">
            ${i < currentIdx ? '✓' : i === currentIdx ? '●' : ''}
          </div>
          <div class="status-info">
            <div class="status-name" style="color:${i <= currentIdx ? 'var(--white)' : 'var(--gray)'}">${s.name}</div>
            <div class="status-desc">${i <= currentIdx ? s.desc : ''}</div>
          </div>
        </div>
      `).join('')}
    </div>
    ${o.trackingNumber ? `<div style="margin-top:16px;font-family:'DM Mono';font-size:0.65rem;color:var(--gray);">Tracking #: <strong style="color:var(--accent)">${o.trackingNumber}</strong></div>` : ''}
  `;
}
</script>
</body>
</html>
